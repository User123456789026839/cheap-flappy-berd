<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #70c5ce;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameCanvas {
    display: block;
    margin: 0 auto;
    background: #70c5ce;
  }
  #outroScreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 10;
  }
  #outroScreen h1 {
    font-size: 2em;
    margin-bottom: 10px;
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeIn 2s ease-in forwards;
  }
  #outroScreen p {
    font-size: 1.1em;
    opacity: 0;
    animation: fadeIn 2s ease-in 0.5s forwards;
    color: #ccc;
  }
  #outroScreen a {
    color: #4db8ff;
    text-decoration: none;
    margin-top: 20px;
    opacity: 0;
    animation: fadeIn 2s ease-in 1s forwards;
    display: inline-block;
  }
  #outroScreen button {
    margin-top: 30px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #666;
    color: #fff;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 2s ease-in 1.5s forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 6s linear infinite;
  }
  @keyframes float {
    from { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    to { transform: translateY(-10vh) translateX(20px); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<div id="outroScreen">
  <h1>♫ I Need You</h1>
  <p>LeAnn Rimes</p>
  <audio id="songAudio" controls style="margin-top:20px; opacity:0; animation: fadeIn 2s ease-in 1s forwards;">
    <source src="LeAnn Rimes - I Need You.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <a href="https://open.spotify.com/search/I%20Need%20You%20LeAnn%20Rimes" target="_blank" rel="noopener">Listen on Spotify →</a>
  <p id="lyricLine" style="min-height: 1.5em; font-size: 1.3em; color: #fff; margin-top: 20px; opacity: 1;"></p>
  <br>
  <button onclick="restartGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const outroScreen = document.getElementById('outroScreen');
const songAudio = document.getElementById('songAudio');

const GRAVITY = 0.4;
const FLAP = -7;
const PIPE_WIDTH = 60;
const PIPE_GAP = 150;
const PIPE_SPEED = 2.3;
const WIN_SCORE = 3;

let bird, pipes, score, frame, gameOver, gameStarted, outroTriggered;

function resetGame() {
  bird = { x: 80, y: 250, vy: 0, radius: 13 };
  pipes = [];
  score = 0;
  frame = 0;
  gameOver = false;
  gameStarted = false;
  outroTriggered = false;
  outroScreen.style.display = 'none';
  songAudio.pause();
  songAudio.currentTime = 0;
  spawnPipe();
}

function spawnPipe() {
  const topHeight = 50 + Math.random() * (canvas.height - PIPE_GAP - 150);
  pipes.push({ x: canvas.width, top: topHeight, passed: false });
}

function flap() {
  if (outroTriggered) return;
  if (gameOver) {
    resetGame();
    return;
  }
  gameStarted = true;
  bird.vy = FLAP;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});
canvas.addEventListener('mousedown', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });

function update() {
  if (!gameStarted || gameOver || outroTriggered) return;

  bird.vy += GRAVITY;
  bird.y += bird.vy;

  frame++;
  if (frame % 90 === 0) spawnPipe();

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
      p.passed = true;
      score++;
      if (score >= WIN_SCORE) {
        triggerOutro();
        return;
      }
    }

    if (p.x < -PIPE_WIDTH) pipes.splice(i, 1);

    if (
      bird.x + bird.radius > p.x &&
      bird.x - bird.radius < p.x + PIPE_WIDTH &&
      (bird.y - bird.radius < p.top || bird.y + bird.radius > p.top + PIPE_GAP)
    ) {
      gameOver = true;
    }
  }

  if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
    gameOver = true;
  }
}

// ---- LYRICS PLACEHOLDER ----
// Fill this in yourself with the lines + timestamps (in seconds) you want shown.
// Each line displays starting at "time" and clears when the next line starts
// (or after "duration" seconds if you set one). Leave it empty for no lyrics.
// Example format (uncomment and edit):
// const lyricLines = [
//   { time: 12.5, text: "your lyric line here" },
//   { time: 16.0, text: "next lyric line here" },
// ];
const lyricLines = [
{ time: 0, text: "You're my only reason"},
{ time: 4, text: "You're my only truth"},
{ time: 6, text: "I need you like water"},
{ time: 10, text: "Like breath like rain"},
{ time: 13, text: "I need you like mercy"},
{ time: 16, text: "From heavens gate"},
{ time: 20, text: "There's a freedom in your arms"},
{ time: 24, text: "That carries me through"},
{ time: 26, text: "I need you"},
{ time: 29, text: "I love you babi😚"}
];

const lyricLineEl = document.getElementById('lyricLine');
let lyricIndex = 0;

function resetLyrics() {
  lyricIndex = 0;
  lyricLineEl.textContent = '';
}

function updateLyrics() {
  if (!lyricLines.length) return;
  const t = songAudio.currentTime;

  // Advance to the correct line based on current playback time
  while (
    lyricIndex < lyricLines.length - 1 &&
    t >= lyricLines[lyricIndex + 1].time
  ) {
    lyricIndex++;
  }

  const current = lyricLines[lyricIndex];
  if (t >= current.time) {
    lyricLineEl.textContent = current.text;
  } else {
    lyricLineEl.textContent = '';
  }
}

function triggerOutro() {
  outroTriggered = true;
  createParticles();
  outroScreen.style.display = 'flex';
  resetLyrics();
  songAudio.play().catch(() => {
    // Autoplay might be blocked until user interacts with the audio controls
  });
  songAudio.addEventListener('timeupdate', updateLyrics);
}

function createParticles() {
  for (let i = 0; i < 40; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.animationDelay = Math.random() * 6 + 's';
    particle.style.animationDuration = (4 + Math.random() * 4) + 's';
    outroScreen.appendChild(particle);
  }
}

function restartGame() {
  document.querySelectorAll('.particle').forEach(p => p.remove());
  resetLyrics();
  resetGame();
}

function draw() {
  ctx.fillStyle = '#70c5ce';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#5cb85c';
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
    ctx.fillRect(p.x, p.top + PIPE_GAP, PIPE_WIDTH, canvas.height - p.top - PIPE_GAP);
    ctx.strokeStyle = '#3f8f3f';
    ctx.lineWidth = 3;
    ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.top);
    ctx.strokeRect(p.x, p.top + PIPE_GAP, PIPE_WIDTH, canvas.height - p.top - PIPE_GAP);
  });

  ctx.fillStyle = '#f4c542';
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#c99a2e';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 32px Courier New';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeText(score, canvas.width / 2, 60);
  ctx.fillText(score, canvas.width / 2, 60);

  if (!gameStarted && !gameOver) {
    ctx.font = '16px Courier New';
    ctx.fillText('Tap / Click / Space to flap', canvas.width / 2, canvas.height / 2);
    ctx.fillText('Reach 3 points!', canvas.width / 2, canvas.height / 2 + 24);
  }

  if (gameOver) {
    ctx.font = 'bold 28px Courier New';
    ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
    ctx.font = '14px Courier New';
    ctx.fillText('Click to try again', canvas.width / 2, canvas.height / 2 + 28);
  }
}

function loop() {
  update();
  if (!outroTriggered) draw();
  requestAnimationFrame(loop);
}

resetGame();
loop();
</script>

</body>
</html>
